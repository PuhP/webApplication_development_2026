{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>Вход</h1>
  <form method="post" class="form">
    <label>Email<input type="email" name="email" required autocomplete="email" placeholder="student@example.com"></label>
    <label>Пароль<input type="password" name="password" required autocomplete="current-password" placeholder="student1234"></label>
    <label class="check"><input type="checkbox" name="remember"> Запомнить меня</label>
    <button class="btn" type="submit">Войти</button>
  </form>
  <p class="muted">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрируйтесь</a>.</p>
</section>
{% endblock %}
